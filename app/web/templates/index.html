<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震应急问答系统</title>
    <link rel="stylesheet" href="/static/app.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div class="app-container">
    <!-- 移动端侧边栏遮罩 -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button id="btn-new-session" class="btn-new" aria-label="新建会话">+ 新建会话</button>
        </div>
        <div class="sidebar-search">
            <input type="text" id="search-input" placeholder="搜索会话..." aria-label="搜索会话" />
        </div>
        <div class="session-list" id="session-list" role="list">
            <!-- 动态填充 -->
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
        <header class="top-bar">
            <button class="btn-hamburger" id="btn-hamburger" aria-label="打开菜单">
                <span></span><span></span><span></span>
            </button>
            <h1>地震应急问答系统</h1>
            <span class="session-title" id="current-session-title"></span>
        </header>

        <!-- 聊天区 -->
        <div class="chat-area" id="chat-area" role="log" aria-live="polite">
            <div class="empty-state" id="empty-state">
                <div class="empty-icon">
                    <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="32" cy="32" r="30" stroke="#1976d2" stroke-width="2" fill="#e3f2fd"/>
                        <path d="M16 40 L28 24 L36 32 L48 20" stroke="#1976d2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <circle cx="20" cy="18" r="3" fill="#ff9800"/>
                        <path d="M18 48 H46" stroke="#90caf9" stroke-width="2" stroke-linecap="round"/>
                        <path d="M22 52 H42" stroke="#bbdefb" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <h2 class="empty-title">地震应急问答助手</h2>
                <p>点击左上角「新建会话」开始提问</p>
                <p class="hint">覆盖震前预防、震时避险、震后救援全场景</p>
                <div class="empty-suggestions">
                    <button class="suggestion-chip" data-query="地震来了怎么办？">地震来了怎么办？</button>
                    <button class="suggestion-chip" data-query="家庭应急包需要准备什么？">家庭应急包准备</button>
                    <button class="suggestion-chip" data-query="地震后如何自救互救？">震后自救互救</button>
                </div>
            </div>
        </div>

        <!-- 输入区 -->
        <div class="input-area" id="input-area" style="display:none;">
            <div class="input-wrapper">
                <textarea id="query-input" placeholder="输入您的问题..." rows="1" aria-label="输入问题"></textarea>
                <button id="btn-send" class="btn-send" disabled aria-label="发送">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </main>
</div>

<!-- 右键菜单 -->
<div class="context-menu" id="context-menu" style="display:none;" role="menu">
    <div class="menu-item" id="menu-rename" role="menuitem">重命名</div>
    <div class="menu-item menu-delete" id="menu-delete" role="menuitem">删除</div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
